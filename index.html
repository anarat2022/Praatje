<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praatje — Speak Dutch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEEE9;
    --ink:#14171C;
    --red:#E63946;
    --blue:#1D3557;
    --yellow:#F4B400;
    --line:#14171C;
    --paper:#FAFAF7;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:24px 16px 60px;
  }
  .app{
    width:100%;
    max-width:880px;
    border:3px solid var(--line);
    background:var(--paper);
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:3px solid var(--line);
    padding:18px 22px;
    gap:12px;
  }
  .title-block h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.5px;
  }
  .title-block p{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--blue);
    margin-top:4px;
  }
  .level-badge{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    border:2px solid var(--line);
    background:var(--yellow);
    padding:6px 10px;
    white-space:nowrap;
    font-weight:500;
  }
  .hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:40px 20px 32px;
    border-bottom:3px solid var(--line);
  }
  #micBtn{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid var(--line);
    background:var(--red);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .12s ease, background .2s ease;
    box-shadow:6px 6px 0 var(--line);
  }
  #micBtn:active{ transform:translate(3px,3px); box-shadow:3px 3px 0 var(--line); }
  #micBtn.listening{ background:var(--blue); animation:pulse 1.1s infinite; }
  #micBtn.thinking{ background:var(--yellow); cursor:wait; }
  #micBtn.speaking{ background:#2A9D5C; }
  @keyframes pulse{
    0%{ box-shadow:6px 6px 0 var(--line), 0 0 0 0 rgba(29,53,87,0.35); }
    70%{ box-shadow:6px 6px 0 var(--line), 0 0 0 18px rgba(29,53,87,0); }
    100%{ box-shadow:6px 6px 0 var(--line), 0 0 0 0 rgba(29,53,87,0); }
  }
  #micBtn svg{ width:42px; height:42px; fill:var(--paper); }
  #micStatus{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--ink);
    min-height:16px;
  }
  .hint-btn{
    background:none;
    border:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--blue);
    text-decoration:underline;
    text-underline-offset:3px;
    cursor:pointer;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:2px;
  }
  .hint-btn:disabled{ opacity:0.4; cursor:default; }
  .lang-toggle{
    display:flex;
    border:2px solid var(--line);
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
  }
  .lang-toggle button{
    padding:6px 14px;
    border:none;
    background:var(--paper);
    cursor:pointer;
    color:var(--ink);
    border-right:2px solid var(--line);
  }
  .lang-toggle button:last-child{ border-right:none; }
  .lang-toggle button.active{ background:var(--ink); color:var(--paper); }
  #startLevelToggle{ flex-wrap:wrap; }
  #startLevelToggle button{ padding:5px 10px; }

  .body-grid{ display:block; }
  .transcript{
    padding:18px 20px;
    max-height:480px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .msg{ display:flex; flex-direction:column; gap:4px; }
  .msg .who{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#6b6f76;
  }
  .msg.user .who{ color:var(--red); }
  .msg.sanne .who{ color:var(--blue); }
  .msg .text-nl{ font-size:16px; line-height:1.5; font-weight:600; color:var(--ink); }
  .msg.user .text-nl{ font-weight:400; }
  .msg .text-en{
    font-size:13px;
    line-height:1.4;
    color:#6b6f76;
    font-style:italic;
    margin-top:2px;
  }
  .hint-marker{ font-style:italic; color:#6b6f76; font-size:13px; }
  .correction{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:#6b6f76;
    border-left:3px solid var(--yellow);
    padding:5px 0 5px 10px;
    margin-top:5px;
    background:rgba(244,180,0,0.08);
  }
  .correction b{ color:var(--ink); font-weight:600; }
  footer{
    border-top:3px solid var(--line);
    padding:12px 20px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:#6b6f76;
    text-align:center;
  }
  .error-banner{
    background:var(--red);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    padding:10px 20px;
    display:none;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
  }
  .retry-btn{
    background:var(--paper);
    color:var(--red);
    border:2px solid var(--paper);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    padding:3px 10px;
    cursor:pointer;
    text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title-block">
      <h1>Praatje</h1>
      <p>speak dutch, one chat at a time</p>
    </div>
    <div class="level-badge" id="levelBadge" title="Tap for what this means" style="cursor:pointer;">CEFR A2+</div>
    <button id="clearBtn" class="hint-btn" style="color:var(--red);">Clear conversation</button>
  </header>

  <div class="error-banner" id="errorBanner"></div>

  <div class="hero">
    <button id="micBtn" aria-label="Start speaking">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    </button>
    <div id="micStatus">tap to talk to sanne</div>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button id="hintTopicBtn" class="hint-btn">Not sure what to say</button>
      <button id="hintGrammarBtn" class="hint-btn">Not sure how to say it</button>
    </div>
    <div class="lang-toggle">
      <button id="langEnBtn">I'LL SPEAK EN</button>
      <button id="langNlBtn" class="active">I'LL SPEAK NL</button>
    </div>
    <div class="lang-toggle" id="startLevelToggle">
      <button data-lvl="1" class="startlvl">A2</button>
      <button data-lvl="2" class="startlvl active">A2+</button>
      <button data-lvl="3" class="startlvl">B1</button>
      <button data-lvl="4" class="startlvl">B1+</button>
      <button data-lvl="5" class="startlvl">B2</button>
    </div>
    <div style="font-family:'IBM Plex Mono', monospace; font-size:10px; color:#6b6f76; text-transform:uppercase; letter-spacing:1px;">set starting level, then talk</div>
  </div>

  <div class="transcript" id="transcript">
    <div class="msg sanne">
      <div class="who">Sanne</div>
      <div class="text-nl">Hoi! Ik ben Sanne. Druk op de microfoon en zeg gewoon hallo.</div>
      <div class="text-en">Hi! I'm Sanne. Tap the mic and just say hello.</div>
    </div>
  </div>

  <footer>no sign-up · your voice never leaves your browser except as text to sanne</footer>
</div>

<script>
// ====== CONFIG — fill this in after you deploy the Cloudflare Worker ======
// Paste the URL Cloudflare gives you, e.g. "https://praatje-proxy.yourname.workers.dev"
const WORKER_URL = "https://praatje-proxy.anaratf.workers.dev/";
// ============================================================================

const transcriptEl = document.getElementById('transcript');
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const levelBadge = document.getElementById('levelBadge');
const errorBanner = document.getElementById('errorBanner');
const langEnBtn = document.getElementById('langEnBtn');
const langNlBtn = document.getElementById('langNlBtn');
const hintTopicBtn = document.getElementById('hintTopicBtn');
const hintGrammarBtn = document.getElementById('hintGrammarBtn');

let history = []; // {role:'user'|'assistant', content:string}
let userTurns = 0;
let inputLang = 'nl-NL';
let isProcessing = false;

const CEFR_LADDER = [
  { label:'A2',  turnsToNext:5, desc:'A2: keep sentences short and simple — present tense, everyday concrete words (home, food, family, weather), basic connectors (en, maar, want). Speak slowly and clearly in your phrasing. Avoid idioms entirely.' },
  { label:'A2+', turnsToNext:5, desc:'A2+: still simple and everyday, but a bit more range — simple opinions ("ik vind het leuk"), routines, mostly present tense with a little simple past (ik heb gedaan, ik ging). Still no idioms, still concrete topics.' },
  { label:'B1',  turnsToNext:6, desc:'B1: hold a real connected conversation on familiar topics — express opinions and give reasons ("omdat", "dus"), use past and future tense comfortably, slightly longer sentences. A few very common idioms are fine if explained naturally through context.' },
  { label:'B1+', turnsToNext:6, desc:'B1+: more natural pacing and connectors (hoewel, terwijl, doordat, toch), can touch slightly abstract topics (opinions on culture, plans, hypotheticals), sentences can have a subordinate clause or two.' },
  { label:'B2',  turnsToNext:999, desc:'B2: speak at a genuinely native conversational pace with normal sentence complexity, use idioms and colloquial expressions naturally without dumbing them down, do not artificially simplify vocabulary — treat her like a Dutch adult friend, not a learner, except for the correction/hint mechanics.' }
];
let levelIndex = 1;

const STORAGE_KEY = 'praatje_conversation_v1';
let savedTurns = []; // {kind:'user'|'hint'|'sanne', text, label, reply_nl, reply_en, correction}

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      history, levelIndex, userTurns, turns: savedTurns
    }));
  } catch(e) { /* storage full or unavailable — conversation just won't persist, not fatal */ }
}

function clearConversation(){
  localStorage.removeItem(STORAGE_KEY);
  history = [];
  userTurns = 0;
  levelIndex = 1;
  savedTurns = [];
  updateLevelBadge();
  transcriptEl.innerHTML = `<div class="msg sanne"><div class="who">Sanne</div><div class="text-nl">Hoi! Ik ben Sanne. Druk op de microfoon en zeg gewoon hallo.</div><div class="text-en">Hi! I'm Sanne. Tap the mic and just say hello.</div></div>`;
}

document.getElementById('clearBtn').onclick = () => {
  if (confirm('Clear this conversation? This cannot be undone.')) clearConversation();
};

function loadSavedState(){
  let raw;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch(e) { return; }
  if (!raw) return;
  let data;
  try { data = JSON.parse(raw); } catch(e) { return; }
  if (!data || !Array.isArray(data.turns) || data.turns.length === 0) return;

  history = data.history || [];
  levelIndex = typeof data.levelIndex === 'number' ? data.levelIndex : 1;
  userTurns = typeof data.userTurns === 'number' ? data.userTurns : 0;
  savedTurns = data.turns;
  updateLevelBadge();

  transcriptEl.innerHTML = '';
  // replay oldest to newest so addToTop ends up with newest visually on top, same as live use
  data.turns.forEach(t => {
    if (t.kind === 'user') renderUserBubble(t.text);
    else if (t.kind === 'hint') renderHintBubble(t.label);
    else if (t.kind === 'sanne') renderSanneBubble(t.reply_nl, t.reply_en, t.correction, false);
  });
}

function updateLevelBadge(){ levelBadge.textContent = 'CEFR ' + CEFR_LADDER[levelIndex].label; }
levelBadge.onclick = () => {
  alert('CEFR is the standard scale for language level, from A1 (total beginner) to C2 (fluent).\n\nThis badge moves up on its own every few exchanges — as you keep talking, Sanne is nudged to use more Dutch and less English to match your growing level. It\'s meant to happen automatically, so seeing it climb (like B1 → B1+) means the app is working as intended.');
};
document.querySelectorAll('.startlvl').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.startlvl').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    levelIndex = parseInt(btn.dataset.lvl, 10) - 1;
    userTurns = 0;
    updateLevelBadge();
  };
});
updateLevelBadge();

langEnBtn.onclick = () => { inputLang='en-US'; langEnBtn.classList.add('active'); langNlBtn.classList.remove('active'); };
langNlBtn.onclick = () => { inputLang='nl-NL'; langNlBtn.classList.add('active'); langEnBtn.classList.remove('active'); };

function showError(msg, retryFn){
  errorBanner.innerHTML = '';
  errorBanner.appendChild(document.createTextNode(msg));
  if (retryFn) {
    const btn = document.createElement('button');
    btn.className = 'retry-btn';
    btn.textContent = 'Retry';
    btn.onclick = () => { errorBanner.style.display = 'none'; retryFn(); };
    errorBanner.appendChild(btn);
  }
  errorBanner.style.display = 'flex';
}

// --- Speech recognition ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
} else {
  showError('This browser does not support voice recognition. Try Chrome on desktop or Android.');
}
let isListening = false;
let finalTranscript = '';

micBtn.onclick = () => {
  if (!recognition) return;
  if (isProcessing) return;
  if (isListening) {
    recognition.stop();
    return;
  }
  window.speechSynthesis.cancel();
  // Safari (especially iOS) only allows speech synthesis to start if it's tied directly
  // to a user gesture. Since Sana's reply comes back after an async network call, Safari
  // silently blocks it unless we "unlock" audio right here, synchronously, on the tap itself.
  const unlock = new SpeechSynthesisUtterance('');
  unlock.volume = 0;
  window.speechSynthesis.speak(unlock);
  micBtn.classList.remove('speaking');
  finalTranscript = '';
  recognition.lang = inputLang;
  try { recognition.start(); } catch(e) { showError('Could not start the microphone: ' + e.message); }
};

if (recognition) {
  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micStatus.textContent = 'listening... tap again when done';
  };
  recognition.onerror = (e) => {
    isListening = false;
    micBtn.classList.remove('listening');
    micStatus.textContent = 'tap to talk to sanne';
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      showError('Microphone access was blocked. Open this file directly in Chrome and allow the mic if this keeps happening.');
    } else if (e.error === 'no-speech') {
      micStatus.textContent = "didn't catch that — tap and try again";
    } else if (e.error !== 'aborted') {
      showError('Mic error: ' + e.error);
    }
  };
  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    const said = finalTranscript.trim();
    finalTranscript = '';
    if (said) {
      addUserMessage(said, inputLang === 'nl-NL' ? 'nl' : 'en');
      sendToSanne(said);
    } else {
      micStatus.textContent = 'tap to talk to sanne';
    }
  };
  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += transcript + ' ';
      } else {
        interim += transcript;
      }
    }
    if (interim) micStatus.textContent = interim;
  };
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function extractJsonObject(raw){
  const start = raw.indexOf('{');
  const end = raw.lastIndexOf('}');
  if (start === -1 || end === -1 || end < start) return null;
  return raw.slice(start, end + 1);
}

function addToTop(el){
  transcriptEl.insertBefore(el, transcriptEl.firstChild);
  transcriptEl.scrollTop = 0;
}

function renderUserBubble(text){
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="who">You</div><div class="text-nl">${escapeHtml(text)}</div>`;
  addToTop(div);
}

function addUserMessage(text, lang){
  renderUserBubble(text);
  history.push({role:'user', content:text});
  userTurns++;
  if (userTurns >= CEFR_LADDER[levelIndex].turnsToNext && levelIndex < CEFR_LADDER.length - 1) {
    levelIndex++; userTurns = 0; updateLevelBadge();
  }
  savedTurns.push({kind:'user', text});
  saveState();
}

function renderHintBubble(label){
  const marker = document.createElement('div');
  marker.className = 'msg user';
  marker.innerHTML = `<div class="who">You</div><div class="text-nl hint-marker">${escapeHtml(label)}</div>`;
  addToTop(marker);
}

function addHintMarker(label, apiContent){
  renderHintBubble(label);
  history.push({role:'user', content: apiContent});
  savedTurns.push({kind:'hint', label});
  saveState();
}

hintTopicBtn.onclick = () => {
  if (isProcessing) return;
  const hintContent = "(I don't know what to say next — can you suggest an idea or a direction for what I could talk about right now, then continue the conversation?)";
  addHintMarker("(asked what to say)", hintContent);
  sendToSanne(hintContent, true);
};

hintGrammarBtn.onclick = () => {
  if (isProcessing) return;
  const hintContent = "(I know roughly what I want to say but I'm not sure how to say it correctly in Dutch — the grammar, conjugation, word order, or the right word. Please look at what we were just talking about and give me the actual Dutch I need, simply explained, then continue the conversation.)";
  addHintMarker("(asked for help with the Dutch)", hintContent);
  sendToSanne(hintContent, true);
};

async function sendToSanne(userText, isHintRequest, attempt){
  attempt = attempt || 1;
  isProcessing = true;
  hintTopicBtn.disabled = true; hintGrammarBtn.disabled = true;
  micBtn.classList.add('thinking');
  micStatus.textContent = 'sanne is thinking...';
  errorBanner.style.display = 'none';

  const stage = CEFR_LADDER[levelIndex];
  const systemPrompt = `You are Sanne, a Dutch friend having a real spoken voice conversation with the learner — like catching up over coffee, not a classroom. NEVER break character to explain a grammar rule or announce a correction; this should feel exactly like chatting with a patient native-speaker friend.

You always reply primarily IN DUTCH — that is the whole point, she needs to hear and practise real Dutch. You also provide a natural English translation of your own reply so she can check her understanding, but the English is never spoken aloud, only shown as a subtitle.

The learner's current CEFR stage is ${stage.label}. ${stage.desc}

Correction behavior: if her last message (in Dutch) had a genuine mistake (wrong conjugation, word order, wrong word), naturally use the correct form yourself somewhere in your reply, the way a friend repeats something back correctly without making a big deal of it. Separately, fill the "correction" field so the app can show a quiet written note. Only set had_mistake true for a real, worth-noting error, not for minor style, and not on every turn even if something is slightly off, so it doesn't feel like grading.

If her message is a request for a hint (she said she's stuck or wants help), figure out from the conversation what kind of stuck she likely is and address that specifically — don't default to just suggesting a topic. If she seems unsure what to say next, suggest a concrete next thing to say. If she seems to be struggling with the Dutch itself (a word she doesn't know, which verb form or conjugation to use, word order, a grammar pattern), give her that directly and simply — e.g. "you'd say 'ik ga' not 'ik gaat', the -t drops for ik" — a real, useful piece of help, not just vague encouragement. Then continue the conversation with an easy follow-up. Leave correction empty for hint requests.

If her message contains multiple sentences or points, respond to all of them, not just the first one — briefly touch on each thing she said before your follow-up, the way a good listener would in a real conversation, rather than latching onto only the first sentence and ignoring the rest.

Always end with a natural follow-up question or comment, like a real person keeping a conversation going.

Respond with ONLY valid JSON — your entire response must be a single JSON object and nothing else. No greeting before it, no repeating your reply after it, no markdown fences, no commentary. Exactly matching this schema:
{"reply_nl":"your spoken Dutch reply","reply_en":"natural English translation of that same reply, shown as subtitle only","correction":{"had_mistake":false,"original":"","better":"","note":""}}

"original" is the exact part of her last message that was off, "better" is the corrected Dutch, "note" is a casual explanation under 8 words — leave all three empty when had_mistake is false.`;

  const messages = history.map(h => ({role: h.role, content: h.content}));
  let networkFailure = false;

  if (!WORKER_URL || WORKER_URL === "PASTE_YOUR_WORKER_URL_HERE") {
    showError('The Worker URL is not set yet — open the file and paste your deployed Worker URL into WORKER_URL near the top of the script.');
    isProcessing = false;
    hintTopicBtn.disabled = false; hintGrammarBtn.disabled = false;
    micBtn.classList.remove('thinking');
    micStatus.textContent = 'tap to talk to sanne';
    return;
  }

  try {
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });
    if (!response.ok) {
      const errText = await response.text().catch(() => '');
      throw new Error('HTTP ' + response.status + (errText ? ': ' + errText.slice(0,150) : ''));
    }
    const data = await response.json();
    const textBlock = data.content.find(c => c.type === 'text');
    let raw = textBlock ? textBlock.text : '{}';
    raw = raw.replace(/```json|```/g, '').trim();
    let parsed = null;
    try {
      parsed = JSON.parse(raw);
    } catch(e) {
      const extracted = extractJsonObject(raw);
      if (extracted) {
        try { parsed = JSON.parse(extracted); } catch(e2) { parsed = null; }
      }
    }
    if (!parsed) {
      // last resort: show whatever plain text came before any JSON-looking content, so we never dump raw JSON on screen
      const cutoff = raw.indexOf('{');
      const plainPart = (cutoff > -1 ? raw.slice(0, cutoff) : raw).trim();
      parsed = { reply_nl: plainPart || "Sorry, ik snapte dat niet helemaal — kun je het nog eens zeggen?", reply_en: '', correction:{had_mistake:false} };
    }
    renderSanneReply(parsed);
    micStatus.textContent = 'tap to talk to sanne';
  } catch(err) {
    networkFailure = (err instanceof TypeError);
    if (attempt < 3) {
      await new Promise(r => setTimeout(r, 600 * attempt));
      isProcessing = false;
      hintTopicBtn.disabled = false; hintGrammarBtn.disabled = false;
      micBtn.classList.remove('thinking');
      return sendToSanne(userText, isHintRequest, attempt + 1);
    }
    const msg = networkFailure
      ? 'The request never reached the server (blocked by network/extension?). Tried 3 times.'
      : 'Could not reach Sanne — ' + err.message;
    showError(msg, () => sendToSanne(userText, isHintRequest, 1));
    micStatus.textContent = 'tap to talk to sanne';
  } finally {
    isProcessing = false;
    hintTopicBtn.disabled = false; hintGrammarBtn.disabled = false;
    micBtn.classList.remove('thinking');
  }
}

function renderSanneBubble(reply_nl, reply_en, correction, doSpeak){
  const div = document.createElement('div');
  div.className = 'msg sanne';
  div.innerHTML = `<div class="who">Sanne</div><div class="text-nl">${escapeHtml(reply_nl || '')}</div>${reply_en ? `<div class="text-en">${escapeHtml(reply_en)}</div>` : ''}`;
  addToTop(div);

  if (correction && correction.had_mistake) {
    const userBubbles = transcriptEl.querySelectorAll('.msg.user');
    const targetUserBubble = userBubbles[0]; // most recent user message is first in DOM order
    if (targetUserBubble) {
      const note = document.createElement('div');
      note.className = 'correction';
      note.innerHTML = `closer to: <b>${escapeHtml(correction.better || '')}</b>${correction.note ? ' — ' + escapeHtml(correction.note) : ''}`;
      targetUserBubble.appendChild(note);
    }
  }

  if (doSpeak) speakDutch(reply_nl);
}

function renderSanneReply(parsed){
  history.push({role:'assistant', content: parsed.reply_nl || ''});
  renderSanneBubble(parsed.reply_nl, parsed.reply_en, parsed.correction, true);
  savedTurns.push({kind:'sanne', reply_nl: parsed.reply_nl, reply_en: parsed.reply_en, correction: parsed.correction});
  saveState();
}

function speakDutch(text){
  if (!text || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const speak = () => {
    const voices = window.speechSynthesis.getVoices();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'nl-NL';
    const match = voices.find(v => v.lang === 'nl-NL') || voices.find(v => v.lang.startsWith('nl'));
    if (match) utter.voice = match;
    utter.rate = 0.95;
    utter.onstart = () => micBtn.classList.add('speaking');
    utter.onend = () => micBtn.classList.remove('speaking');
    utter.onerror = () => micBtn.classList.remove('speaking');
    window.speechSynthesis.speak(utter);
  };
  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = speak;
  } else {
    speak();
  }
}

loadSavedState();

</script>
